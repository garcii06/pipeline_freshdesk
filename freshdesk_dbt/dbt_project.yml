name: freshdesk_dbt

profile: freshdesk_dbt

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  freshdesk_dbt:
    +schema: raw

models:
  freshdesk_dbt:
    # Materialize staging models as views, and marts as tables
    bronze:
      +materialized: view
      +schema: bronze
    silver:
      +materialized: view
      +schema: silver
    gold:
      +materialized: table
      +schema: gold